<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h3 class="heading"> Simon Says game </h3>

        <div class="scoreText">
        Click anywhere to start new game
        </div>

        <div class="boxArea1"> 
            
            <div class="box box1" id="box1" type="button">box1</div>
            <div class="box box2" id="box2"  type="button">box2</div>
            
        </div>

        <div class="boxArea2">
            <div class="box box3" id="box3" type="button">box3</div>
            <div class="box box4" id="box4"  type="button">box4</div>
        </div>

    </div>


    <script src="script.js"></script>
</body>

</html>
